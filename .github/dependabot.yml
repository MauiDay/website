version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      frontend-stack:
        patterns:
          - "astro"
          - "@astrojs/*"
          - "tailwindcss"
          - "@tailwindcss/*"
          - "vite"
          - "@vitejs/*"
          - "postcss"
          - "autoprefixer"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"
